name: OperaIQ Keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping OperaIQ API health
        run: |
          curl --fail --silent --show-error --max-time 60 https://operaiq-api.3.208.71.125.sslip.io/health
      - name: Ping OperaIQ web shell
        run: |
          curl --fail --silent --show-error --max-time 60 --header "Accept: text/html" https://operaiq.onrender.com/
