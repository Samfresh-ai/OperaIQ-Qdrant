name: sentinel-aws

services:
  splunk:
    image: splunk/splunk:9.4
    hostname: splunk
    restart: unless-stopped
    environment:
      SPLUNK_START_ARGS: --accept-license
      SPLUNK_GENERAL_TERMS: --accept-sgt-current-at-splunk-com
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD:?Set SPLUNK_PASSWORD in .env.aws}
      SPLUNK_HEC_TOKEN: ${SPLUNK_HEC_TOKEN:?Set SPLUNK_HEC_TOKEN in .env.aws}
    volumes:
      - splunk-etc:/opt/splunk/etc
      - splunk-var:/opt/splunk/var
      - ./deploy/aws/splunk-default.yml:/tmp/defaults/default.yml:ro
    ports:
      - "8000:8000"
      - "8088:8088"
    healthcheck:
      test: ["CMD-SHELL", "curl -sk -u admin:$${SPLUNK_PASSWORD} https://localhost:8089/services/server/info?output_mode=json >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 90s

  sentinel:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL in .env.aws}
        NEXT_PUBLIC_SPLUNK_DASHBOARD_URL: ${NEXT_PUBLIC_SPLUNK_DASHBOARD_URL:?Set NEXT_PUBLIC_SPLUNK_DASHBOARD_URL in .env.aws}
    restart: unless-stopped
    env_file:
      - .env.aws
    environment:
      NODE_ENV: production
      PORT: 3001
      SPLUNK_HOST: splunk
      SPLUNK_MGMT_URL: ${SPLUNK_MGMT_URL:-https://splunk:8089}
      SPLUNK_HEC_URL: ${SPLUNK_HEC_URL:-http://splunk:8088/services/collector/event}
      SPLUNK_USERNAME: ${SPLUNK_USERNAME:-admin}
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD:?Set SPLUNK_PASSWORD in .env.aws}
      SPLUNK_HEC_TOKEN: ${SPLUNK_HEC_TOKEN:?Set SPLUNK_HEC_TOKEN in .env.aws}
      SPLUNK_TLS_REJECT_UNAUTHORIZED: ${SPLUNK_TLS_REJECT_UNAUTHORIZED:-false}
      SPLUNK_GATEWAY_TOKEN: ""
      SPLUNK_CF_ACCESS_CLIENT_ID: ""
      SPLUNK_CF_ACCESS_CLIENT_SECRET: ""
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.aws}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?Set WEBHOOK_SECRET in .env.aws}
      AGENT_TOOL_SECRET: ${AGENT_TOOL_SECRET:?Set AGENT_TOOL_SECRET in .env.aws}
    ports:
      - "3001:3001"
    depends_on:
      splunk:
        condition: service_healthy

volumes:
  splunk-etc:
  splunk-var:
