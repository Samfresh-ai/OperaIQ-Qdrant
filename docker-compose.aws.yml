name: operaiq-aws

services:
  qdrant:
    image: qdrant/qdrant:v1.18.1
    hostname: qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:?Set QDRANT_API_KEY in .env.aws}
      QDRANT__STORAGE__SNAPSHOTS_PATH: /qdrant/snapshots
    volumes:
      - qdrant-storage:/qdrant/storage
      - qdrant-snapshots:/qdrant/snapshots
    ports:
      - "127.0.0.1:6333:6333"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-OperaIQ}
      APP_ENV: production
      PORT: "8097"
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:?Set QDRANT_API_KEY in .env.aws}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-incident_memories}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      OPERAIQ_API_TOKEN: ${OPERAIQ_API_TOKEN:?Set OPERAIQ_API_TOKEN in .env.aws}
      ALLOW_UNAUTHENTICATED_WRITES: "false"
      ALLOW_JUDGE_QUICK_RUN: ${ALLOW_JUDGE_QUICK_RUN:-true}
      ALLOW_JUDGE_RESET: ${ALLOW_JUDGE_RESET:-false}
      PROOF_ARTIFACTS_DIR: ${PROOF_ARTIFACTS_DIR:-artifacts/proof}
    ports:
      - "8097:8097"
    depends_on:
      - qdrant

volumes:
  qdrant-storage:
  qdrant-snapshots:
