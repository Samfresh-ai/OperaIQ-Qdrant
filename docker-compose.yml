services:
  app:
    build: .
    restart: unless-stopped
    depends_on:
      - qdrant
    environment:
      APP_NAME: OperaIQ
      APP_ENV: production
      PORT: "8097"
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: incident_memories
      OPERAIQ_API_TOKEN: local-compose-token
      ALLOW_UNAUTHENTICATED_WRITES: "false"
      ALLOW_COLLECTION_RESET: "false"
    ports:
      - "8097:8097"

  qdrant:
    image: qdrant/qdrant:v1.18.1
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./operaiq_qdrant_storage:/qdrant/storage
