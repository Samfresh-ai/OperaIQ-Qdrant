services:
  - type: web
    name: operaiq
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    maxShutdownDelaySeconds: 60
    envVars:
      - key: APP_NAME
        value: OperaIQ
      - key: APP_ENV
        value: production
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION
        value: incident_memories
      - key: EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: OPERAIQ_API_TOKEN
        generateValue: true
      - key: ALLOW_UNAUTHENTICATED_WRITES
        value: "false"
      - key: ALLOW_JUDGE_QUICK_RUN
        value: "true"
      - key: ALLOW_JUDGE_RESET
        value: "false"
      - key: PROOF_ARTIFACTS_DIR
        value: artifacts/proof
